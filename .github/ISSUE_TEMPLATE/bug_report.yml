name: Bug report
description: Something is broken in the app or the build
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - App behavior on the watch
        - Build / CI (GitHub Actions)
        - Installation / signing
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: versionName from the release you installed (e.g. 1.0.0), or the commit SHA for an Actions artifact.
  - type: input
    id: device
    attributes:
      label: Device & OS version
      placeholder: Huawei Watch D2, HarmonyOS x.y.z
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: hdc hilog output, Actions log links, or photos of the watch screen.

name: Build D2 Prototype HAP

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dev tooling
        run: npm ci

      - name: Run unit tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup HarmonyOS build environment
        uses: ./.github/actions/setup-harmonyos

      # Advisory only: it is unverified whether the community Linux repack of
      # the command-line tools ships codelinter. DevEco Studio's Code Linter
      # remains the authoritative check (see docs/testing.md).
      - name: Code linter (advisory)
        continue-on-error: true
        run: |
          CODELINTER=$(find ~/commandline-tools -type f -name "codelinter" -path "*/bin/*" | head -1)
          if [ -z "$CODELINTER" ]; then
            echo "::notice::codelinter not found in command-line tools; skipping"
            exit 0
          fi
          chmod +x "$CODELINTER"
          "$CODELINTER" ./ || echo "::warning::codelinter reported issues"

      - name: Build HAP (debug)
        run: |
          chmod +x ./hvigorw
          ./hvigorw assembleHap -p buildMode=debug --no-daemon

      - name: List built HAP files
        if: always()
        run: |
          echo "::group::Searching for .hap files"
          find . -name "*.hap" -type f 2>/dev/null
          echo "::endgroup::"

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2-prototype-hap
          path: |
            **/*.hap
          if-no-files-found: error

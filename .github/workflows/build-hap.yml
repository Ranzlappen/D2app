name: Build D2 Prototype HAP

on:
  push:
    branches: [ '**' ]          # works on ANY branch (including yours)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup HarmonyOS SDK
        uses: harmonyos-dev/setup-harmonyos-sdk@v0.2.0

      - name: Install dependencies
        run: |
          npm config set registry https://repo.huaweicloud.com/repository/npm/
          npm config set @ohos:registry https://repo.harmonyos.com/npm/
          ohpm install --all

      - name: Build HAP (debug)
        run: |
          chmod +x ./hvigorw
          ./hvigorw clean
          ./hvigorw assembleHap -p buildMode=debug --no-daemon

      # NEW: Debug step – shows exactly where the .hap is created
      - name: Locate HAP file
        run: find . -name "*.hap" -type f | head -10

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2-prototype-hap
          path: '**/*.hap'        # catches ANY .hap anywhere

name: Build D2 Prototype HAP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  COMMANDLINE_TOOLS_VERSION: "5.0.5.310"
  COMMANDLINE_TOOLS_REPO: "fcitx-contrib/ohpm-cli-tools"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache HarmonyOS command-line tools
        id: cache-cli-tools
        uses: actions/cache@v4
        with:
          path: ~/commandline-tools
          key: harmonyos-cli-${{ env.COMMANDLINE_TOOLS_VERSION }}-linux-x64

      - name: Download HarmonyOS command-line tools
        if: steps.cache-cli-tools.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE_PREFIX="commandline-tools-linux-x64-${COMMANDLINE_TOOLS_VERSION}.zip"

          # Download split zip parts from the community mirror
          gh release download "${COMMANDLINE_TOOLS_VERSION}" \
            --repo "${COMMANDLINE_TOOLS_REPO}" \
            --pattern "${ARCHIVE_PREFIX}.*" \
            --dir /tmp/cli-parts

          # Reassemble split archive
          cat /tmp/cli-parts/${ARCHIVE_PREFIX}.* > /tmp/commandline-tools.zip
          rm -rf /tmp/cli-parts

          # Extract
          mkdir -p ~/commandline-tools
          unzip -qo /tmp/commandline-tools.zip -d ~/commandline-tools
          rm /tmp/commandline-tools.zip

      - name: Setup OpenHarmony SDK
        id: ohos-sdk
        uses: openharmony-rs/setup-ohos-sdk@v1
        with:
          version: "5.0.0"

      - name: Setup tool paths
        run: |
          # Find and add ohpm to PATH
          OHPM_BIN=$(find ~/commandline-tools -type f -name "ohpm" -path "*/bin/*" | head -1)
          if [ -n "$OHPM_BIN" ]; then
            echo "$(dirname "$OHPM_BIN")" >> "$GITHUB_PATH"
            echo "Found ohpm at: $OHPM_BIN"
          else
            echo "::error::ohpm binary not found in command-line tools"
            find ~/commandline-tools -type f -name "ohpm" || true
            exit 1
          fi

          # Find and add hvigor to PATH (if bundled)
          HVIGOR_BIN=$(find ~/commandline-tools -type f -name "hvigorw" -path "*/bin/*" | head -1)
          if [ -n "$HVIGOR_BIN" ]; then
            echo "$(dirname "$HVIGOR_BIN")" >> "$GITHUB_PATH"
          fi

          # List what we got
          echo "::group::Installed command-line tools"
          ls -la ~/commandline-tools/
          echo "::endgroup::"

      - name: Configure SDK paths and accept licenses
        run: |
          SDK_RAW="${{ steps.ohos-sdk.outputs.sdk-path }}"
          API_VERSION="${{ steps.ohos-sdk.outputs.api-version }}"
          echo "SDK raw path: $SDK_RAW"
          echo "API version: $API_VERSION"

          # Without fixup-path, SDK components are flat: $SDK_RAW/ets/, $SDK_RAW/js/, etc.
          # hvigor (OpenHarmony mode) checks OHOS_BASE_SDK_HOME for sdk.dir
          # It expects: $OHOS_BASE_SDK_HOME/openharmony/<api>/ets/...
          SDK_HOME="$HOME/ohos-sdk-home"
          mkdir -p "$SDK_HOME/openharmony"
          ln -sfn "$SDK_RAW" "$SDK_HOME/openharmony/$API_VERSION"

          # Set OHOS_BASE_SDK_HOME (what hvigor checks for OpenHarmony runtimeOS)
          echo "OHOS_BASE_SDK_HOME=$SDK_HOME" >> "$GITHUB_ENV"

          # Also create local.properties with sdk.dir as fallback
          echo "sdk.dir=$SDK_HOME" > local.properties

          # Accept SDK licenses:
          # hvigor checks for $SDK_HOME/openharmony/licenses/<licenseId>.sha256
          # Each SDK component's oh-uni-package.json has a "license" field.
          # We read it, hash the license text from the component, and write the marker.
          LICENSES_DIR="$SDK_HOME/openharmony/licenses"
          mkdir -p "$LICENSES_DIR"

          for pkg_file in "$SDK_RAW"/*/oh-uni-package.json; do
            if [ -f "$pkg_file" ]; then
              LICENSE_ID=$(node -e "const p=require('$pkg_file'); console.log(p.license || p.licenseName || '')" 2>/dev/null)
              if [ -n "$LICENSE_ID" ]; then
                COMPONENT_DIR=$(dirname "$pkg_file")
                # Look for a license file in the component directory
                LICENSE_FILE=""
                for lf in "$COMPONENT_DIR/LICENSE" "$COMPONENT_DIR/license" "$COMPONENT_DIR/LICENSE.txt" "$COMPONENT_DIR/NOTICE"; do
                  if [ -f "$lf" ]; then
                    LICENSE_FILE="$lf"
                    break
                  fi
                done
                if [ -n "$LICENSE_FILE" ]; then
                  HASH=$(sha256sum "$LICENSE_FILE" | cut -d' ' -f1)
                else
                  # Use the license ID itself as content fallback
                  HASH=$(echo -n "$LICENSE_ID" | sha256sum | cut -d' ' -f1)
                fi
                echo "$HASH" > "$LICENSES_DIR/${LICENSE_ID}.sha256"
                echo "Accepted license: $LICENSE_ID (hash: ${HASH:0:16}...)"
              fi
            fi
          done

          # Debug: verify the structure is correct
          echo "::group::SDK structure verification"
          echo "OHOS_BASE_SDK_HOME=$SDK_HOME"
          ls -la "$SDK_HOME/openharmony/"
          ls -la "$SDK_HOME/openharmony/$API_VERSION/" 2>/dev/null || echo "ERROR: symlink target missing"
          ls -la "$LICENSES_DIR/" 2>/dev/null || echo "No licenses dir"
          echo "::endgroup::"

      - name: Configure ohpm registry
        run: |
          ohpm config set registry https://repo.harmonyos.com/ohpm/
          ohpm -v

      - name: Configure npm registries
        run: |
          npm config set registry https://repo.huaweicloud.com/repository/npm/
          npm config set @ohos:registry https://repo.harmonyos.com/npm/

      - name: Install ohpm dependencies
        run: |
          ohpm install --all || echo "::warning::ohpm install had issues (may be OK if no ohpm deps)"

      - name: Build HAP (debug)
        run: |
          chmod +x ./hvigorw
          ./hvigorw assembleHap -p buildMode=debug --no-daemon

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2-prototype-hap
          path: |
            **/build/*.hap
            **/outputs/*.hap
